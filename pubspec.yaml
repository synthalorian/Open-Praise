name: open_praise
description: A high-performance setlist and chord sheet manager for worship teams.
version: 1.3.0+1
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  web_socket_channel: ^3.0.3
  network_info_plus: ^5.0.1
  flutter_midi_command: ^0.5.1
  file_picker: ^8.0.0
  supabase_flutter: ^2.12.2
  syncfusion_flutter_pdf: ^30.2.4
  pdfrx: ^1.0.97
  google_mlkit_text_recognition: ^0.13.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

